<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookstore</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --primary-dark: #3730a3;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --danger: #ef4444;
    --success: #22c55e;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-lg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 20px;
  }
  .search-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .search-bar .field { flex: 1; min-width: 160px; }
  .search-bar label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
  input, select, textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    transition: border .2s, box-shadow .2s;
    background: #fff;
    color: var(--text);
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(79,70,229,.12);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: .85; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-icon { padding: 8px; line-height: 1; }
  .auth-section {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .auth-section input { width: 140px; padding: 8px 12px; font-size: 13px; }
  .auth-section .btn { padding: 8px 16px; font-size: 13px; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .badge-admin { background: #fef3c7; color: #92400e; }
  .badge-user { background: #dbeafe; color: #1e40af; }
  .user-info { display: flex; align-items: center; gap: 8px; }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: .4; }
  .empty-state h3 { margin-bottom: 4px; color: var(--text); }
  .empty-state p { font-size: 14px; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
  }
  td {
    padding: 14px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f1f5f9; }
  .book-title { font-weight: 600; }
  .book-author { color: var(--text-muted); font-size: 13px; }
  .book-isbn { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; color: var(--text-muted); }
  .actions { white-space: nowrap; }
  .action-group { display: flex; gap: 6px; align-items: center; }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 14px 20px;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 1000;
    transform: translateY(120px);
    opacity: 0;
    transition: all .3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-success { background: #16a34a; }
  .toast-error { background: #dc2626; }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
    transform: translateY(20px) scale(.97);
    transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal h2 { margin-bottom: 20px; font-size: 20px; }
  .modal .field { margin-bottom: 16px; }
  .modal .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .loading { text-align: center; padding: 48px; color: var(--text-muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) {
    .header { flex-direction: column; gap: 12px; }
    .header h1 { font-size: 18px; }
    .search-bar .field { min-width: 100%; }
    table { font-size: 13px; }
    td, th { padding: 10px 8px; }
    .auth-section input { width: 110px; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>Bookstore</h1>
  <div class="header-actions">
    <div class="auth-section" id="authSection">
      <input type="text" id="usernameInput" placeholder="Username" value="user">
      <input type="password" id="passwordInput" placeholder="Password" value="user">
      <button class="btn btn-primary btn-sm" onclick="login()">Login</button>
    </div>
    <div class="user-info" id="userInfo" style="display:none">
      <span id="loggedInUser"></span>
      <span class="badge" id="userRoleBadge"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
</header>

<div class="container">

  <div class="card">
    <div class="search-bar">
      <div class="field">
        <label>Title</label>
        <input type="text" id="searchTitle" placeholder="Search by title..." oninput="searchBooks()">
      </div>
      <div class="field">
        <label>Author</label>
        <input type="text" id="searchAuthor" placeholder="Search by author..." oninput="searchBooks()">
      </div>
      <button class="btn btn-primary" onclick="openAddModal()" id="addBookBtn" style="display:none">+ Add Book</button>
    </div>
  </div>

  <div class="card">
    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p style="margin-top:8px">Loading books...</p>
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <h3>No books found</h3>
      <p>Try adjusting your search or add a new book.</p>
    </div>
    <div id="tableWrap" style="overflow-x:auto;display:none">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Year</th>
            <th>Price</th>
            <th>Genre</th>
            <th style="width:110px">Actions</th>
          </tr>
        </thead>
        <tbody id="bookTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="bookModal">
  <div class="modal">
    <h2 id="modalTitle">Add Book</h2>
    <input type="hidden" id="editIsbn">
    <div class="field">
      <label>Title</label>
      <input type="text" id="bookTitle" required>
    </div>
    <div class="field">
      <label>Author Name</label>
      <input type="text" id="authorName" required>
    </div>
    <div class="field">
      <label>Author Birthday</label>
      <input type="date" id="authorBirthday">
    </div>
    <div class="field">
      <label>ISBN</label>
      <input type="text" id="bookIsbn" placeholder="e.g. 978-3-16-148410-0">
    </div>
    <div class="field">
      <label>Year</label>
      <input type="number" id="bookYear" min="1000" max="2099">
    </div>
    <div class="field">
      <label>Price</label>
      <input type="number" id="bookPrice" min="0" step="0.01" placeholder="0.00">
    </div>
    <div class="field">
      <label>Genre</label>
      <input type="text" id="bookGenre" placeholder="e.g. Fiction">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBook()">Save</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let credentials = null;
let isAdmin = false;

function encodeCredentials(u, p) {
  return 'Basic ' + btoa(u + ':' + p);
}

function login() {
  const u = document.getElementById('usernameInput').value;
  const p = document.getElementById('passwordInput').value;
  if (!u) return showToast('Please enter a username', 'error');
  credentials = encodeCredentials(u, p);
  isAdmin = u === 'admin';
  document.getElementById('authSection').style.display = 'none';
  document.getElementById('userInfo').style.display = 'flex';
  const badge = document.getElementById('userRoleBadge');
  badge.textContent = isAdmin ? 'Admin' : 'User';
  badge.className = 'badge ' + (isAdmin ? 'badge-admin' : 'badge-user');
  document.getElementById('loggedInUser').textContent = u;
  document.getElementById('addBookBtn').style.display = 'inline-flex';
  searchBooks();
}

function logout() {
  credentials = null;
  isAdmin = false;
  document.getElementById('authSection').style.display = 'flex';
  document.getElementById('userInfo').style.display = 'none';
  document.getElementById('addBookBtn').style.display = 'none';
  document.getElementById('bookTableBody').innerHTML = '';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
  document.querySelector('#emptyState h3').textContent = 'Please log in';
  document.querySelector('#emptyState p').textContent = 'Enter your credentials above to browse books.';
}

function api(path, options) {
  const headers = { 'Content-Type': 'application/json' };
  if (credentials) headers['Authorization'] = credentials;
  return fetch(path, { ...options, headers })
    .then(r => {
      if (r.status === 403) throw new Error('Access denied: insufficient permissions');
      if (r.status === 401) throw new Error('Invalid credentials');
      if (!r.ok) return r.json().then(e => { throw new Error(e.message || 'Request failed'); });
      return r.status === 204 ? null : r.json();
    });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function searchBooks() {
  const title = document.getElementById('searchTitle').value;
  const author = document.getElementById('searchAuthor').value;
  if (!credentials) return;
  const params = new URLSearchParams();
  if (title) params.set('title', title);
  if (author) params.set('author', author);
  const qs = params.toString();
  showLoading(true);
  api('/api/books' + (qs ? '?' + qs : ''))
    .then(books => renderBooks(books))
    .catch(err => {
      showToast(err.message, 'error');
      showLoading(false);
    });
}

function renderBooks(books) {
  showLoading(false);
  if (!books || books.length === 0) {
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'block';
  const tbody = document.getElementById('bookTableBody');
  tbody.innerHTML = books.map(b => {
    const authorNames = (b.authors || []).map(a => a.name).join(', ') || '-';
    return '<tr>' +
      '<td><div class="book-title">' + esc(b.title) + '</div></td>' +
      '<td><span class="book-author">' + esc(authorNames) + '</span></td>' +
      '<td><span class="book-isbn">' + esc(b.isbn) + '</span></td>' +
      '<td>' + (b.year || '-') + '</td>' +
      '<td>' + (b.price != null ? '$' + Number(b.price).toFixed(2) : '-') + '</td>' +
      '<td>' + esc(b.genre || '-') + '</td>' +
      '<td class="actions"><div class="action-group">' +
        '<button class="btn btn-outline btn-sm btn-icon" onclick="openEditModal(\'' + b.isbn + '\')" title="Edit">&#9998;</button>' +
        (isAdmin ? '<button class="btn btn-danger btn-sm btn-icon" onclick="deleteBook(\'' + b.isbn + '\')" title="Delete">&times;</button>' : '') +
      '</div></td></tr>';
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showLoading(loading) {
  document.getElementById('loadingState').style.display = loading ? 'block' : 'none';
  if (loading) {
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
  } else if (document.getElementById('bookTableBody').children.length > 0) {
    document.getElementById('tableWrap').style.display = 'block';
  }
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = 'Add Book';
  document.getElementById('editIsbn').value = '';
  document.getElementById('bookTitle').value = '';
  document.getElementById('authorName').value = '';
  document.getElementById('authorBirthday').value = '';
  document.getElementById('bookIsbn').value = '';
  document.getElementById('bookIsbn').disabled = false;
  document.getElementById('bookYear').value = '';
  document.getElementById('bookPrice').value = '';
  document.getElementById('bookGenre').value = '';
  document.getElementById('bookModal').classList.add('open');
}

function openEditModal(isbn) {
  showLoading(true);
  api('/api/books')
    .then(books => {
      const book = books.find(b => b.isbn === isbn);
      if (!book) throw new Error('Book not found');
      document.getElementById('modalTitle').textContent = 'Edit Book';
      document.getElementById('editIsbn').value = isbn;
      document.getElementById('bookTitle').value = book.title || '';
      const authors = book.authors || [];
      document.getElementById('authorName').value = authors.length > 0 ? (authors[0].name || '') : '';
      document.getElementById('authorBirthday').value = authors.length > 0 ? (authors[0].birthday || '') : '';
      document.getElementById('bookIsbn').value = book.isbn || '';
      document.getElementById('bookIsbn').disabled = true;
      document.getElementById('bookYear').value = book.year || '';
      document.getElementById('bookPrice').value = book.price || '';
      document.getElementById('bookGenre').value = book.genre || '';
      document.getElementById('bookModal').classList.add('open');
      showLoading(false);
    })
    .catch(err => {
      showToast(err.message, 'error');
      showLoading(false);
    });
}

function closeModal() {
  document.getElementById('bookModal').classList.remove('open');
}

function isValidIsbn(s) {
  const cleaned = s.replace(/-/g, '');
  if (cleaned.length === 10) return /^\d{9}[\dXx]$/.test(cleaned);
  if (cleaned.length === 13) return /^\d{13}$/.test(cleaned);
  return false;
}

function saveBook() {
  const title = document.getElementById('bookTitle').value.trim();
  const authorName = document.getElementById('authorName').value.trim();
  const authorBirthday = document.getElementById('authorBirthday').value.trim();
  const isbn = document.getElementById('bookIsbn').value.trim();
  const year = document.getElementById('bookYear').value;
  const price = document.getElementById('bookPrice').value;
  const genre = document.getElementById('bookGenre').value.trim();
  const editIsbn = document.getElementById('editIsbn').value;

  if (!title) return showToast('Title is required', 'error');
  if (!authorName) return showToast('Author name is required', 'error');
  if (!editIsbn && !isbn) return showToast('ISBN is required', 'error');
  if (!editIsbn && !isValidIsbn(isbn)) return showToast('ISBN must be a valid ISBN-10 or ISBN-13', 'error');
  if (!year) return showToast('Year is required', 'error');
  const yearNum = Number(year);
  if (!Number.isInteger(yearNum) || yearNum < 1000 || yearNum > 2099) return showToast('Year must be a valid number between 1000 and 2099', 'error');
  if (price === '') return showToast('Price is required', 'error');
  const priceNum = Number(price);
  if (isNaN(priceNum) || priceNum < 0) return showToast('Price must be a valid positive number', 'error');
  if (!genre) return showToast('Genre is required', 'error');

  const body = {
    isbn: editIsbn || isbn,
    title,
    authors: [{ name: authorName, birthday: authorBirthday || null }],
    year: yearNum,
    price: priceNum,
    genre
  };

  if (editIsbn) {
    api('/api/books/' + editIsbn, { method: 'PUT', body: JSON.stringify(body) })
      .then(() => {
        showToast('Book updated', 'success');
        closeModal();
        searchBooks();
      })
      .catch(err => showToast(err.message, 'error'));
  } else {
    api('/api/books', { method: 'POST', body: JSON.stringify(body) })
      .then(() => {
        showToast('Book added', 'success');
        closeModal();
        searchBooks();
      })
      .catch(err => showToast(err.message, 'error'));
  }
}

function deleteBook(isbn) {
  if (!confirm('Delete this book?')) return;
  api('/api/books/' + isbn, { method: 'DELETE' })
    .then(() => {
      showToast('Book deleted', 'success');
      searchBooks();
    })
    .catch(err => showToast(err.message, 'error'));
}

document.getElementById('bookModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

login();
</script>
</body>
</html>
